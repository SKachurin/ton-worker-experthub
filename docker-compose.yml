services:
  ton-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ton-worker-experthub
    ports:
      - "8081:8081"
    environment:
      - PORT=${PORT}
      - TON_WORKER_AUTH_TOKEN=${TON_WORKER_AUTH_TOKEN}
      - TON_NETWORK=${TON_NETWORK}
      - TON_RPC_ENDPOINT=${TON_RPC_ENDPOINT}
      - TON_API_KEY=${TON_API_KEY}
      - TON_CONTROLLER_MNEMONIC=${TON_CONTROLLER_MNEMONIC}
      - BOOKING_ESCROW_ARTIFACT_PATH=${BOOKING_ESCROW_ARTIFACT_PATH}
    volumes:
      - ./:/app
      - /app/node_modules
    restart: unless-stopped